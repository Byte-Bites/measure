<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>おえかきキャンディラボ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg-dark: #1a1032;
    --bg-panel: #241848;
    --bg-surface: #2e2058;
    --bg-hover: #3a2c6a;
    --border: #4a3878;
    --border-active: #ff6bca;
    --text-primary: #f8f0ff;
    --text-secondary: #c4a8e8;
    --text-muted: #8a6cb8;
    --accent: #ff6bca;
    --accent-glow: rgba(255, 107, 202, 0.35);
    --accent2: #6be8ff;
    --accent2-glow: rgba(107, 232, 255, 0.3);
    --danger: #ff5a72;
    --danger-glow: rgba(255, 90, 114, 0.25);
    --success: #5aff8a;
    --success-glow: rgba(90, 255, 138, 0.25);
    --yellow: #ffe54a;
    --yellow-glow: rgba(255, 229, 74, 0.3);
    --canvas-bg: #fffdf6;
    --stroke-color: #ff7a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans JP', 'Baloo 2', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    touch-action: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: linear-gradient(165deg, #1a1032 0%, #0f1a3a 40%, #1a1032 100%);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: linear-gradient(90deg, rgba(36, 24, 72, 0.95), rgba(20, 30, 60, 0.95));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    min-height: 54px;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #ff6bca, #6be8ff, #ffe54a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px var(--accent-glow), 0 0 20px rgba(107, 232, 255, 0.15);
    animation: logoShimmer 4s ease-in-out infinite;
  }

  @keyframes logoShimmer {
    0%, 100% { box-shadow: 0 2px 12px var(--accent-glow), 0 0 20px rgba(107, 232, 255, 0.15); }
    50% { box-shadow: 0 2px 16px rgba(255, 229, 74, 0.3), 0 0 24px var(--accent-glow); }
  }

  .logo-text {
    font-family: 'Baloo 2', 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #ff6bca, #6be8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* ── Buttons ── */
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-surface);
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn:active {
    transform: scale(0.94);
    background: var(--bg-hover);
  }

  .btn-icon { padding: 8px 10px; }

  .btn-danger {
    border-color: rgba(255, 90, 114, 0.4);
    color: var(--danger);
  }
  .btn-danger:active { background: var(--danger-glow); }

  .btn-accent {
    background: linear-gradient(135deg, var(--accent), #c84dff);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 14px var(--accent-glow);
  }
  .btn-accent:active { transform: scale(0.94); filter: brightness(0.9); }

  .btn-generate {
    background: linear-gradient(135deg, #ffe54a, #ffb02e, #ff7a2e);
    border-color: transparent;
    color: #1a1032;
    box-shadow: 0 2px 16px var(--yellow-glow);
    font-weight: 700;
    font-family: 'Baloo 2', 'Noto Sans JP', sans-serif;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .btn-generate:active { transform: scale(0.94); filter: brightness(0.9); }

  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .btn:disabled { opacity: 0.3; pointer-events: none; }

  /* ── Pencil-only toggle ── */
  .pencil-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
  }

  .pencil-toggle.active {
    background: linear-gradient(135deg, rgba(107, 232, 255, 0.15), rgba(255, 107, 202, 0.1));
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px var(--accent2-glow);
  }

  .pencil-toggle .toggle-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.2s;
  }
  .pencil-toggle.active .toggle-dot {
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
  }

  /* ── Canvas Area ── */
  .canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 30%, rgba(255, 107, 202, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(107, 232, 255, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255, 229, 74, 0.04) 0%, transparent 40%),
      var(--bg-dark);
  }

  .canvas-wrapper {
    position: relative;
    background: var(--canvas-bg);
    border-radius: 8px;
    box-shadow:
      0 8px 50px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255, 107, 202, 0.1),
      0 0 40px rgba(107, 232, 255, 0.05);
  }

  canvas {
    display: block;
    border-radius: 8px;
    touch-action: none;
  }

  #drawCanvas {
    position: absolute;
    top: 0; left: 0;
    z-index: 2;
    cursor: crosshair;
  }

  #displayCanvas {
    position: relative;
    z-index: 1;
  }

  /* ── Toolbar (bottom) ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 12px;
    background: linear-gradient(90deg, rgba(36, 24, 72, 0.95), rgba(20, 30, 60, 0.95));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    min-height: 52px;
    backdrop-filter: blur(12px);
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-right: 1px solid rgba(74, 56, 120, 0.5);
  }
  .toolbar-group:last-child { border-right: none; }

  .toolbar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 6px;
    white-space: nowrap;
  }

  .input-field {
    width: 70px;
    padding: 6px 8px;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

  .input-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .stroke-control { display: flex; align-items: center; gap: 6px; }

  .stroke-preview {
    width: 28px; height: 28px;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .stroke-dot {
    border-radius: 50%;
    background: var(--stroke-color);
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 6, 20, 0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: linear-gradient(165deg, var(--bg-panel), #1a1040);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px var(--accent-glow);
  }

  .modal h2 {
    font-family: 'Baloo 2', 'Noto Sans JP', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    background: linear-gradient(90deg, #ffe54a, #ff6bca);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(74, 56, 120, 0.4);
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row label { font-size: 13px; color: var(--text-secondary); }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .gcode-preview {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--success);
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.6;
    white-space: pre;
    margin-top: 12px;
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 16px;
    background: rgba(26, 16, 50, 0.9);
    border-top: 1px solid rgba(74, 56, 120, 0.3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .pen-indicator {
    position: fixed;
    top: 62px;
    right: 16px;
    padding: 6px 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #1a1032;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 2px 12px var(--accent2-glow);
  }
  .pen-indicator.show { opacity: 1; }

  .touch-blocked {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 20px;
    background: rgba(255, 90, 114, 0.15);
    border: 1px solid rgba(255, 90, 114, 0.3);
    color: var(--danger);
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .touch-blocked.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div>
        <div class="logo-text">おえかきキャンディラボ</div>
        <div class="logo-sub">Powered by Byte Bites Inc.</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="pencil-toggle active" id="btnPencilOnly" title="Apple Pencilのみ">
        <div class="toggle-dot"></div>
        <span>✏️ Pencilのみ</span>
      </button>
      <button class="btn btn-icon" id="btnUndo" disabled title="元に戻す">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><path d="M3 10l4-4M3 10l4 4"/></svg>
      </button>
      <button class="btn btn-danger btn-icon" id="btnClear" title="全消去">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <button class="btn btn-generate" id="btnGenerate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        G-Code 生成
      </button>
    </div>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="displayCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">線幅</span>
      <div class="stroke-control">
        <button class="btn btn-icon" id="btnStrokeMinus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="stroke-preview">
          <div class="stroke-dot" id="strokeDot"></div>
        </div>
        <button class="btn btn-icon" id="btnStrokePlus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">レイヤーピッチ</span>
      <input type="number" class="input-field" id="layerPitch" value="1.5" step="0.05" min="0.05">
      <span class="input-unit">mm</span>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">造形層数</span>
      <input type="number" class="input-field" id="layerCount" value="2" step="1" min="1" max="999">
      <span class="input-unit">層</span>
    </div>
  </div>

  <div class="status-bar">
    <div><span class="status-dot"></span><span id="statusText">Apple Pencil 対応 — 描画してください</span></div>
    <div id="pathCount">パス: 0</div>
  </div>
</div>

<div class="pen-indicator" id="penIndicator">✏️ Pencil 検出</div>
<div class="touch-blocked" id="touchBlocked">🖐 指タッチはブロック中（Pencilのみモード）</div>

<div class="modal-overlay" id="gcodeModal">
  <div class="modal">
    <h2>🍬 G-Code 生成結果</h2>
    <div class="modal-row">
      <label>総パス数</label>
      <span id="modalPaths" style="font-family:'IBM Plex Mono';color:var(--accent);">0</span>
    </div>
    <div class="modal-row">
      <label>レイヤーピッチ</label>
      <span id="modalPitch" style="font-family:'IBM Plex Mono';color:var(--accent2);">0.2mm</span>
    </div>
    <div class="modal-row">
      <label>造形層数</label>
      <span id="modalLayers" style="font-family:'IBM Plex Mono';color:var(--accent2);">1</span>
    </div>
    <div class="modal-row">
      <label>総行数</label>
      <span id="modalLines" style="font-family:'IBM Plex Mono';color:var(--accent);">0</span>
    </div>
    <div class="modal-row">
      <label>総吐出量 (E)</label>
      <span id="modalExtrusion" style="font-family:'IBM Plex Mono';color:var(--yellow);">0mm</span>
    </div>
    <div class="gcode-preview" id="gcodePreview"></div>
    <div class="modal-actions">
      <button class="btn" id="btnCloseModal">閉じる</button>
      <button class="btn btn-accent" id="btnDownload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ダウンロード .gcode
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  const state = {
    paths: [],
    undoStack: [],
    currentPath: null,
    strokeWidth: 10,
    isDrawing: false,
    gcodeResult: '',
    pencilOnly: true
  };

  const container = document.getElementById('canvasContainer');
  const wrapper = document.getElementById('canvasWrapper');
  const displayCanvas = document.getElementById('displayCanvas');
  const drawCanvas = document.getElementById('drawCanvas');
  const displayCtx = displayCanvas.getContext('2d');
  const drawCtx = drawCanvas.getContext('2d');
  const penIndicator = document.getElementById('penIndicator');
  const touchBlocked = document.getElementById('touchBlocked');
  let touchBlockedTimer = null;

  function resizeCanvas() {
    const rect = container.getBoundingClientRect();
    const pad = 24;
    const maxW = rect.width - pad * 2;
    const maxH = rect.height - pad * 2;
    let w, h;
    if (maxW / maxH > 1) { h = maxH; w = h; }
    else { w = maxW; h = w; }
    w = Math.floor(w); h = Math.floor(h);
    const dpr = window.devicePixelRatio || 1;
    [displayCanvas, drawCanvas].forEach(c => {
      c.width = w * dpr; c.height = h * dpr;
      c.style.width = w + 'px'; c.style.height = h + 'px';
    });
    wrapper.style.width = w + 'px'; wrapper.style.height = h + 'px';
    displayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redrawDisplay();
  }

  // ── Pencil-only filter ──
  function isPencilAllowed(e) {
    if (!state.pencilOnly) return true;
    if (e.pointerType === 'pen') return true;
    showTouchBlocked();
    return false;
  }

  function showTouchBlocked() {
    touchBlocked.classList.add('show');
    clearTimeout(touchBlockedTimer);
    touchBlockedTimer = setTimeout(() => touchBlocked.classList.remove('show'), 1200);
  }

  // ── Drawing ──
  function getPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    return {
      x: (e.clientX || (e.touches && e.touches[0].clientX) || 0) - rect.left,
      y: (e.clientY || (e.touches && e.touches[0].clientY) || 0) - rect.top,
      pressure: e.pressure !== undefined ? e.pressure : 0.5
    };
  }

  function startDraw(e) {
    if (!isPencilAllowed(e)) { e.preventDefault(); return; }
    if (e.pointerType === 'pen') {
      penIndicator.classList.add('show');
      setTimeout(() => penIndicator.classList.remove('show'), 800);
    }
    e.preventDefault();
    state.isDrawing = true;
    const pos = getPos(e);
    state.currentPath = { points: [pos], strokeWidth: state.strokeWidth };
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    drawCtx.beginPath();
    drawCtx.moveTo(pos.x, pos.y);
    drawCtx.strokeStyle = '#ff7a2e';
    drawCtx.lineWidth = state.strokeWidth;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
  }

  function moveDraw(e) {
    if (!state.isDrawing || !state.currentPath) return;
    e.preventDefault();
    const pos = getPos(e);
    state.currentPath.points.push(pos);
    const pressure = pos.pressure || 0.5;
    drawCtx.lineWidth = state.strokeWidth * (0.5 + pressure);
    drawCtx.lineTo(pos.x, pos.y);
    drawCtx.stroke();
    drawCtx.beginPath();
    drawCtx.moveTo(pos.x, pos.y);
  }

  function endDraw(e) {
    if (!state.isDrawing || !state.currentPath) return;
    e.preventDefault();
    state.isDrawing = false;
    if (state.currentPath.points.length > 1) {
      state.currentPath.points = simplifyPath(state.currentPath.points, 1.0);
      state.undoStack.push(state.paths.map(p => ({...p, points: [...p.points]})));
      state.paths.push(state.currentPath);
      updateUI();
    }
    state.currentPath = null;
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    redrawDisplay();
  }

  // ── RDP simplification ──
  function simplifyPath(pts, eps) {
    if (pts.length <= 2) return pts;
    let mx = 0, mi = 0;
    const s = pts[0], e = pts[pts.length - 1];
    for (let i = 1; i < pts.length - 1; i++) {
      const d = perpDist(pts[i], s, e);
      if (d > mx) { mx = d; mi = i; }
    }
    if (mx > eps) {
      const l = simplifyPath(pts.slice(0, mi + 1), eps);
      const r = simplifyPath(pts.slice(mi), eps);
      return l.slice(0, -1).concat(r);
    }
    return [s, e];
  }

  function perpDist(p, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len === 0) return Math.hypot(p.x - a.x, p.y - a.y);
    return Math.abs(dy * p.x - dx * p.y + b.x * a.y - b.y * a.x) / len;
  }

  // ── Redraw ──
  function redrawDisplay() {
    const w = parseFloat(displayCanvas.style.width);
    const h = parseFloat(displayCanvas.style.height);
    displayCtx.clearRect(0, 0, w, h);
    // Grid
    displayCtx.strokeStyle = 'rgba(255, 122, 46, 0.06)';
    displayCtx.lineWidth = 0.5;
    for (let x = 20; x < w; x += 20) {
      displayCtx.beginPath(); displayCtx.moveTo(x, 0); displayCtx.lineTo(x, h); displayCtx.stroke();
    }
    for (let y = 20; y < h; y += 20) {
      displayCtx.beginPath(); displayCtx.moveTo(0, y); displayCtx.lineTo(w, y); displayCtx.stroke();
    }
    // Paths
    state.paths.forEach(path => {
      if (path.points.length < 2) return;
      displayCtx.beginPath();
      displayCtx.strokeStyle = '#ff7a2e';
      displayCtx.lineWidth = path.strokeWidth;
      displayCtx.lineCap = 'round';
      displayCtx.lineJoin = 'round';
      displayCtx.moveTo(path.points[0].x, path.points[0].y);
      for (let i = 1; i < path.points.length; i++) displayCtx.lineTo(path.points[i].x, path.points[i].y);
      displayCtx.stroke();
    });
  }

  function updateUI() {
    document.getElementById('btnUndo').disabled = state.paths.length === 0;
    document.getElementById('pathCount').textContent = `パス: ${state.paths.length}`;
    document.getElementById('statusText').textContent = state.paths.length > 0
      ? `${state.paths.length} パス — 合計 ${state.paths.reduce((s, p) => s + p.points.length, 0)} 頂点`
      : 'Apple Pencil 対応 — 描画してください';
    updateStrokeDot();
  }

  function updateStrokeDot() {
    const dot = document.getElementById('strokeDot');
    const sz = Math.max(4, Math.min(18, state.strokeWidth * 2));
    dot.style.width = sz + 'px'; dot.style.height = sz + 'px';
  }

  // ── G-Code ──
  function generateGCode() {
    if (state.paths.length === 0) return;
    const pitch = parseFloat(document.getElementById('layerPitch').value) || 0.2;
    const layers = parseInt(document.getElementById('layerCount').value) || 1;
    const bedW = 140, bedH = 140;
    const nozzleDia = 0.4;
    const filamentDia = 1.75;
    const canvasW = parseFloat(displayCanvas.style.width);
    const canvasH = parseFloat(displayCanvas.style.height);
    const scaleX = bedW / canvasW, scaleY = bedH / canvasH;
    const filamentArea = Math.PI * (filamentDia / 2) ** 2;
    const extMul = (nozzleDia * pitch) / filamentArea;
    let totalE = 0;
    const L = [];
    L.push('; G-Code generated by おえかきキャンディラボ');
    L.push(`; Paths: ${state.paths.length}`);
    L.push(`; Layers: ${layers}, Pitch: ${pitch}mm`);
    L.push(`; Bed: ${bedW}x${bedH}mm`);
    L.push(`; Nozzle: ${nozzleDia}mm, Filament: ${filamentDia}mm`);
    L.push(`; Extrusion multiplier: ${extMul.toFixed(5)} mm/mm`);
    L.push('');
    L.push('G21 ; mm units');
    L.push('G90 ; absolute positioning');
    L.push('M82 ; absolute extrusion');
    L.push('G28 ; home all axes');
    L.push('G92 E0 ; reset extruder');
    L.push('');
    for (let layer = 0; layer < layers; layer++) {
      const z = ((layer + 1) * pitch).toFixed(3);
      L.push(`; === Layer ${layer + 1} / ${layers} — Z=${z}mm ===`);
      L.push(`G1 Z${z} F300`);
      L.push('');
      state.paths.forEach((path, pi) => {
        if (path.points.length < 2) return;
        const f = path.points[0];
        const fx = (f.x * scaleX).toFixed(3);
        const fy = ((canvasH - f.y) * scaleY).toFixed(3);
        L.push(`; Path ${pi + 1}`);
        totalE -= 1.0;
        L.push(`G1 E${totalE.toFixed(4)} F2400 ; retract`);
        L.push(`G0 X${fx} Y${fy} ; move to start`);
        totalE += 1.0;
        L.push(`G1 E${totalE.toFixed(4)} F2400 ; un-retract`);
        let px0 = f.x * scaleX, py0 = (canvasH - f.y) * scaleY;
        for (let i = 1; i < path.points.length; i++) {
          const pt = path.points[i];
          const px = pt.x * scaleX, py = (canvasH - pt.y) * scaleY;
          totalE += Math.sqrt((px - px0) ** 2 + (py - py0) ** 2) * extMul;
          L.push(`G1 X${px.toFixed(3)} Y${py.toFixed(3)} E${totalE.toFixed(4)} F600`);
          px0 = px; py0 = py;
        }
        L.push('');
      });
    }
    totalE -= 1.0;
    L.push(`G1 E${totalE.toFixed(4)} F2400 ; final retract`);
    L.push('G0 Z10 ; lift');
    L.push('G28 X Y ; home XY');
    L.push('M84 ; disable motors');
    L.push('; end');
    state.gcodeResult = L.join('\n');
    document.getElementById('modalPaths').textContent = state.paths.length;
    document.getElementById('modalPitch').textContent = pitch + 'mm';
    document.getElementById('modalLayers').textContent = layers;
    document.getElementById('modalLines').textContent = L.length;
    document.getElementById('modalExtrusion').textContent = totalE.toFixed(2) + 'mm';
    const prev = L.slice(0, 40).join('\n');
    document.getElementById('gcodePreview').textContent = prev + (L.length > 40 ? '\n...' : '');
    document.getElementById('gcodeModal').classList.add('active');
  }

  function downloadGCode() {
    if (!state.gcodeResult) return;
    const blob = new Blob([state.gcodeResult], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const d = String(now.getFullYear()) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    const t = String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
    a.href = url; a.download = `CP_${d}_${t}.gcode`; a.click();
    URL.revokeObjectURL(url);
  }

  // ── Events ──
  drawCanvas.addEventListener('pointerdown', startDraw, { passive: false });
  drawCanvas.addEventListener('pointermove', moveDraw, { passive: false });
  drawCanvas.addEventListener('pointerup', endDraw, { passive: false });
  drawCanvas.addEventListener('pointercancel', endDraw, { passive: false });
  drawCanvas.addEventListener('pointerleave', endDraw, { passive: false });
  drawCanvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  drawCanvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  document.getElementById('btnPencilOnly').addEventListener('click', () => {
    state.pencilOnly = !state.pencilOnly;
    const btn = document.getElementById('btnPencilOnly');
    btn.classList.toggle('active', state.pencilOnly);
    btn.querySelector('span').textContent = state.pencilOnly ? '✏️ Pencilのみ' : '✏️ 全入力';
  });

  document.getElementById('btnUndo').addEventListener('click', () => {
    if (state.undoStack.length > 0) state.paths = state.undoStack.pop();
    else state.paths = [];
    updateUI(); redrawDisplay();
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    if (state.paths.length === 0) return;
    state.undoStack.push(state.paths.map(p => ({...p, points: [...p.points]})));
    state.paths = [];
    updateUI(); redrawDisplay();
  });

  document.getElementById('btnStrokeMinus').addEventListener('click', () => {
    state.strokeWidth = Math.max(0.5, state.strokeWidth - 0.5); updateStrokeDot();
  });
  document.getElementById('btnStrokePlus').addEventListener('click', () => {
    state.strokeWidth = Math.min(24, state.strokeWidth + 0.5); updateStrokeDot();
  });

  document.getElementById('btnGenerate').addEventListener('click', generateGCode);
  document.getElementById('btnCloseModal').addEventListener('click', () => {
    document.getElementById('gcodeModal').classList.remove('active');
  });
  document.getElementById('btnDownload').addEventListener('click', downloadGCode);
  document.getElementById('gcodeModal').addEventListener('click', e => {
    if (e.target === document.getElementById('gcodeModal'))
      document.getElementById('gcodeModal').classList.remove('active');
  });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  updateUI();
})();
</script>
</body>
</html>
